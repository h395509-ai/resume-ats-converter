<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS Resume Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ATS Resume Converter</h1>
  <form id="uploadForm" enctype="multipart/form-data">
    <input type="file" id="resumeFile" name="resumeFile" accept=".pdf,.doc,.docx,.txt" required>
    <button type="submit">Convert to ATS</button>
  </form>
  <div id="result"></div>
  <script src="script.js"></script>
</body>
</html>
